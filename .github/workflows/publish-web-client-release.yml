# Publishes web-client (incl. per-platform Node.js native binaries) and the
# node-sdk-* packages to npm at the default `latest` dist-tag when a GitHub
# release is published. Mirrors the structure of publish-web-client-next.yml
# but is gated on a release event and skips the patch-release-label check.

name: Publish Web Client SDK on Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      should_publish: ${{ steps.check_version.outputs.should_publish }}
      current_version: ${{ steps.check_version.outputs.current_version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Ensure release tag has version bump
        id: check_version
        run: ./scripts/check-web-client-version-release.sh "$GITHUB_SHA"

  build-native-nodejs:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    strategy:
      matrix:
        include:
          - os: macos-26
            platform-package: node-sdk-darwin-arm64
          - os: macos-26-intel
            platform-package: node-sdk-darwin-x64
          - os: ubuntu-24.04
            platform-package: node-sdk-linux-x64-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Install Rust
        run: rustup update --no-self-update

      - name: Build napi binary
        run: cargo build -p miden-client-web --no-default-features --features nodejs --release

      - name: Prepare .node binary
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXT="dylib"
          else
            EXT="so"
          fi
          BINARY=$(find target -name "libmiden_client_web.${EXT}" -path "*/release/*" | head -1)
          if [ -z "$BINARY" ]; then
            echo "::error::napi binary not found"
            exit 1
          fi
          cp "$BINARY" "packages/${{ matrix.platform-package }}/miden_client_web.node"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform-package }}
          path: packages/${{ matrix.platform-package }}/miden_client_web.node

  publish:
    needs: [check-version, build-native-nodejs]
    if: >
      !cancelled() &&
      needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Set up Rust and wasm target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          target: wasm32-unknown-unknown
          components: rust-src

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen

      # ── Publish Node.js platform packages ──
      - name: Download native binary artifacts
        if: needs.build-native-nodejs.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Sync platform package versions and publish
        if: needs.build-native-nodejs.result == 'success'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_WEBCLIENT_TOKEN }}
        run: |
          WEB_VERSION=$(jq -r '.version' crates/web-client/package.json)
          for pkg in node-sdk-darwin-arm64 node-sdk-darwin-x64 node-sdk-linux-x64-gnu; do
            cp "artifacts/${pkg}/miden_client_web.node" "packages/${pkg}/miden_client_web.node"
            jq --arg v "$WEB_VERSION" '.version = $v' "packages/${pkg}/package.json" > /tmp/pkg.json
            mv /tmp/pkg.json "packages/${pkg}/package.json"
            echo "Publishing @miden-sdk/${pkg##node-sdk-}@${WEB_VERSION}..."
            cd "packages/${pkg}"
            npm publish --access public
            cd ../..
          done

      # ── Build and publish web-client ──
      - name: Install & build web-client
        run: |
          pnpm install --no-frozen-lockfile
          pnpm --filter @miden-sdk/miden-sdk run build

      - name: Verify WASM is optimized
        run: |
          wasm_file=$(find crates/web-client/dist/assets -name '*.wasm' | head -1)
          size=$(stat --format=%s "$wasm_file")
          max_size=$((25 * 1024 * 1024))
          echo "WASM size: $((size / 1024 / 1024))MB ($size bytes)"
          if [ "$size" -gt "$max_size" ]; then
            echo "::error::WASM is $((size / 1024 / 1024))MB — exceeds 25MB limit. wasm-opt likely failed silently."
            exit 1
          fi

      - name: Inject Node.js optionalDependencies before publish
        if: needs.build-native-nodejs.result == 'success'
        run: |
          cd crates/web-client
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            const v = pkg.version;
            pkg.optionalDependencies = {
              '@miden-sdk/node-darwin-arm64': v,
              '@miden-sdk/node-darwin-x64': v,
              '@miden-sdk/node-linux-x64-gnu': v,
            };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Injected optionalDependencies with version ' + v);
          "

      - name: Publish web-client to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_WEBCLIENT_TOKEN }}
        # `pnpm publish` automatically replaces `workspace:*` specifiers
        # with the resolved version from the workspace package.json
        # before publishing, so the published artifact is consumable
        # outside the monorepo.
        run: pnpm --filter @miden-sdk/miden-sdk publish --no-git-checks

      - name: Done
        env:
          CURRENT_VERSION: ${{ needs.check-version.outputs.current_version }}
        run: echo "✅ Build complete; published version $CURRENT_VERSION (with Node.js platform binaries)."

  skipped:
    needs: check-version
    if: needs.check-version.outputs.should_publish != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Skipped publish
        env:
          SHOULD_PUBLISH: ${{ needs.check-version.outputs.should_publish }}
          CURRENT_VERSION: ${{ needs.check-version.outputs.current_version }}
        run: |
          echo "ℹ️ Publish skipped; should_publish=$SHOULD_PUBLISH"
          if [ -n "$CURRENT_VERSION" ]; then
            echo "Current version: $CURRENT_VERSION"
          fi
