name: Publish Web Client SDK on Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Set up Rust and wasm target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          target: wasm32-unknown-unknown
          components: rust-src

      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: Ensure release tag has web-client version bump
        id: check_version
        run: ./scripts/check-web-client-version-release.sh "$GITHUB_SHA"

      - name: Ensure release tag has react-sdk version bump
        id: check_react_version
        run: ./scripts/check-react-sdk-version-release.sh "$GITHUB_SHA"

      - name: Ensure release tag has vite-plugin version bump
        id: check_vite_plugin_version
        run: ./scripts/check-vite-plugin-version-release.sh "$GITHUB_SHA"

      # Run pnpm install once if any of the three packages need to publish.
      # The react-sdk build also needs the WASM dist, so we install whenever
      # ANY of the three needs to ship.
      - name: Install workspace dependencies
        if: steps.check_version.outputs.should_publish == 'true' || steps.check_react_version.outputs.should_publish == 'true' || steps.check_vite_plugin_version.outputs.should_publish == 'true'
        run: pnpm install --no-frozen-lockfile

      # ── Web-client (WASM) ─────────────────────────────────────────────
      # The WASM dist also feeds the react-sdk build, so we run the build
      # whenever EITHER web-client or react-sdk needs to publish. Publishing
      # itself is gated separately on the web-client version-bump check.

      - name: Build web-client
        if: steps.check_version.outputs.should_publish == 'true' || steps.check_react_version.outputs.should_publish == 'true'
        run: pnpm --filter @miden-sdk/miden-sdk run build

      - name: Verify WASM is optimized
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          wasm_file=$(find crates/web-client/dist/assets -name '*.wasm' | head -1)
          size=$(stat --format=%s "$wasm_file")
          max_size=$((25 * 1024 * 1024))
          echo "WASM size: $((size / 1024 / 1024))MB ($size bytes)"
          if [ "$size" -gt "$max_size" ]; then
            echo "::error::WASM is $((size / 1024 / 1024))MB — exceeds 25MB limit. wasm-opt likely failed silently."
            exit 1
          fi

      - name: Publish web-client to npm
        if: steps.check_version.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_WEBCLIENT_TOKEN }}
        # `pnpm publish` automatically replaces `workspace:*` specifiers
        # with the resolved version from the workspace package.json
        # before publishing, so the published artifact is consumable
        # outside the monorepo.
        run: pnpm --filter @miden-sdk/miden-sdk publish --no-git-checks

      # ── React SDK ─────────────────────────────────────────────────────
      # Built and published independently — the react-sdk build consumes the
      # web-client dist (built above when needed) but ships its own JS bundle.

      - name: Build react-sdk
        if: steps.check_react_version.outputs.should_publish == 'true'
        run: pnpm --filter @miden-sdk/react run build

      - name: Publish react-sdk to npm
        if: steps.check_react_version.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_WEBCLIENT_TOKEN }}
        run: pnpm --filter @miden-sdk/react publish --no-git-checks

      # ── Vite plugin ───────────────────────────────────────────────────
      # Pure JS plugin, no WASM dependency.

      - name: Build vite-plugin
        if: steps.check_vite_plugin_version.outputs.should_publish == 'true'
        run: pnpm --filter @miden-sdk/vite-plugin run build

      - name: Publish vite-plugin to npm
        if: steps.check_vite_plugin_version.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_WEBCLIENT_TOKEN }}
        run: pnpm --filter @miden-sdk/vite-plugin publish --no-git-checks

      # ── Reporting ─────────────────────────────────────────────────────

      - name: Done (web-client)
        if: steps.check_version.outputs.should_publish == 'true'
        env:
          CURRENT_VERSION: ${{ steps.check_version.outputs.current_version }}
        run: echo "✅ Web-client published version $CURRENT_VERSION."

      - name: Done (react-sdk)
        if: steps.check_react_version.outputs.should_publish == 'true'
        env:
          CURRENT_VERSION: ${{ steps.check_react_version.outputs.current_version }}
        run: echo "✅ React SDK published version $CURRENT_VERSION."

      - name: Done (vite-plugin)
        if: steps.check_vite_plugin_version.outputs.should_publish == 'true'
        env:
          CURRENT_VERSION: ${{ steps.check_vite_plugin_version.outputs.current_version }}
        run: echo "✅ Vite plugin published version $CURRENT_VERSION."

      - name: Skipped publish (web-client)
        if: steps.check_version.outputs.should_publish != 'true'
        env:
          SHOULD_PUBLISH: ${{ steps.check_version.outputs.should_publish }}
          CURRENT_VERSION: ${{ steps.check_version.outputs.current_version }}
        run: |
          echo "ℹ️ Web-client publish skipped; should_publish=$SHOULD_PUBLISH"
          if [ -n "$CURRENT_VERSION" ]; then
            echo "Current version: $CURRENT_VERSION"
          fi

      - name: Skipped publish (react-sdk)
        if: steps.check_react_version.outputs.should_publish != 'true'
        env:
          SHOULD_PUBLISH: ${{ steps.check_react_version.outputs.should_publish }}
          CURRENT_VERSION: ${{ steps.check_react_version.outputs.current_version }}
        run: |
          echo "ℹ️ React SDK publish skipped; should_publish=$SHOULD_PUBLISH"
          if [ -n "$CURRENT_VERSION" ]; then
            echo "Current version: $CURRENT_VERSION"
          fi

      - name: Skipped publish (vite-plugin)
        if: steps.check_vite_plugin_version.outputs.should_publish != 'true'
        env:
          SHOULD_PUBLISH: ${{ steps.check_vite_plugin_version.outputs.should_publish }}
          CURRENT_VERSION: ${{ steps.check_vite_plugin_version.outputs.current_version }}
        run: |
          echo "ℹ️ Vite plugin publish skipped; should_publish=$SHOULD_PUBLISH"
          if [ -n "$CURRENT_VERSION" ]; then
            echo "Current version: $CURRENT_VERSION"
          fi
