name: Deploy wallet example

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      # The workspace (root) uses pnpm. The example app at
      # packages/react-sdk/examples/wallet is intentionally OUTSIDE the
      # workspace (its file: deps to sibling miden-* repos would otherwise
      # bleed into the SDK install graph), so it keeps its own yarn.lock.
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build react sdk
        run: pnpm --filter @miden-sdk/react run build
      - name: Install wallet example dependencies (pnpm, ignore-workspace)
        # The example is intentionally OUTSIDE the workspace (not listed in
        # pnpm-workspace.yaml). --ignore-workspace tells pnpm to treat this
        # subdir as a standalone project so its file: deps to sibling miden-*
        # repos don't bleed into the SDK install graph.
        working-directory: packages/react-sdk/examples/wallet
        run: pnpm install --no-frozen-lockfile --ignore-workspace
      - name: Build wallet example
        working-directory: packages/react-sdk/examples/wallet
        run: pnpm exec vite build --base=/${{ github.event.repository.name }}/wallet-react-example/ --outDir=dist/wallet-react-example
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/react-sdk/examples/wallet/dist

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
