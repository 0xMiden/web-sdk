name: Test
permissions:
  contents: read
on:
  push:
    branches: [main, next]
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "docs/**"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_CACHE_KEY: rust-cache-2026.02.18
  # Pin the miden-client version used for test infrastructure.
  # MUST match the miden-client + miden-protocol versions in Cargo.lock — the
  # node-builder serves protos using the schema of this ref, and a mismatch
  # against the client manifests as cryptic 'invalid wire type' decode errors
  # on the client side (e.g. Digest fields encoded as bytes vs fixed64).
  MIDEN_CLIENT_REF: v0.14.4

jobs:
  build-web-client-dist-folder:
    # Uses the `release-fast` cargo profile (LTO off, codegen-units=16) and
    # skips wasm-opt — both via the MIDEN_FAST_BUILD env var. The shipped
    # artifact is built with the canonical full-optimization `release`
    # profile by the `verify-release-build` job (push to main/next only).
    # sccache + Swatinem/rust-cache layer together: rust-cache gives a
    # warm target/ directory, sccache gives finer per-crate caching that
    # survives even when target/ is partially invalidated.
    name: Build Web Client
    runs-on: ubuntu-24.04
    env:
      # Tell sccache-action to use the GitHub Actions cache backend. The
      # action sets RUSTC_WRAPPER=sccache as a step output on success — we
      # deliberately do NOT set it at job level, so that if sccache-action
      # fails (e.g. transient GHA cache backend outage), RUSTC_WRAPPER
      # stays unset and rustc runs directly. Beats killing the whole build
      # for a cache-only optimization.
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (needed for WASM build)
        run: |
          rustup update --no-self-update
          rustup target add wasm32-unknown-unknown

      # GitHub blocked the legacy ACTIONS_CACHE_URL endpoint that
      # mozilla-actions/sccache-action used by default. The new GHA cache
      # service requires ACTIONS_RESULTS_URL + ACTIONS_RUNTIME_TOKEN, which
      # are set in the runner's process env but NOT exported to subsequent
      # steps unless we forward them ourselves. See sccache docs:
      # https://github.com/mozilla/sccache/blob/main/docs/GHA.md
      - name: Configure sccache cache backend (v2)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        # Tolerate transient GHA cache backend failures (HTML 503 etc).
        # The probe step below validates sccache works before exposing
        # it as RUSTC_WRAPPER.
        continue-on-error: true
        id: sccache-install

      - name: Probe sccache and enable wrapper if healthy
        if: steps.sccache-install.outcome == 'success' && env.SCCACHE_PATH != ''
        shell: bash
        run: |
          # The mozilla-actions/sccache-action sets SCCACHE_PATH but does
          # NOT set RUSTC_WRAPPER. Probe by starting the sccache server,
          # which validates GHA cache backend connectivity. Only then
          # expose RUSTC_WRAPPER so cargo uses sccache as a compile cache.
          # Capture stderr so we can see WHY a probe failed.
          probe_out=$("$SCCACHE_PATH" --start-server 2>&1) && rc=0 || rc=$?
          echo "$probe_out"
          if [ $rc -eq 0 ]; then
            echo "RUSTC_WRAPPER=$SCCACHE_PATH" >> "$GITHUB_ENV"
            echo "sccache enabled as RUSTC_WRAPPER ($SCCACHE_PATH)"
          else
            echo "sccache --start-server failed (rc=$rc); running without wrapper"
          fi

      - name: Install binaryen (wasm-opt)
        # Still needed by the rollup plugin's discovery even when we skip
        # the actual wasm-opt invocation.
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: Add Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-wasm
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          # Save the rust-cache on push to either long-lived branch so PR
          # restores hit warm caches regardless of base. main is the default
          # branch (cache visible to all PRs via GHA fallback) and next is
          # the integration branch where most pre-release churn happens —
          # both worth caching independently so PRs against either don't
          # cold-build.
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next' }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: |
            crates/web-client/yarn.lock
            crates/idxdb-store/src/yarn.lock

      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh crates/web-client

      - name: Check TSC output equals committed JS
        run: |
          cd ./crates/idxdb-store/src/
          yarn
          yarn tsc --outDir ci_test_folder
          pushd ci_test_folder
          find . -type f ! -name "*.js" -delete
          popd
          diff -bur js ci_test_folder

      - name: Restore cache - dist folder
        id: dist-cache
        uses: actions/cache/restore@v4
        with:
          # Cache key includes 'fast' so the fast-build dist doesn't poison
          # the verify-release-build dist (and vice versa).
          path: ./crates/web-client/dist
          key: ${{ runner.os }}-dist-fast-${{ hashFiles('Cargo.lock', 'crates/web-client/package.json', 'crates/web-client/yarn.lock', 'crates/web-client/rollup.config.js', 'crates/web-client/clean.js', 'crates/web-client/js/**/*', 'crates/web-client/src/**/*', 'crates/idxdb-store/src/package.json', 'crates/idxdb-store/src/yarn.lock', 'crates/idxdb-store/src/tsconfig*.json', 'crates/idxdb-store/src/ts/**/*') }}
          restore-keys: ${{ runner.os }}-dist-fast-

      - name: Build project
        if: steps.dist-cache.outputs.cache-hit != 'true'
        # MIDEN_WEB_DEV=true would enable profile.release.debug='full',
        # which adds full per-crate DWARF and accounts for ~9 of the 13-min
        # baseline. The line-tables-only debug already enabled by default
        # gives readable stack traces at a fraction of the cost.
        # MIDEN_FAST_BUILD does the rest (LTO off, codegen-units=16, no
        # wasm-opt). PR CI doesn't ship the artifact — verify-release-build
        # uses the canonical full profile on push to main/next.
        run: |
          cd ./crates/web-client
          MIDEN_FAST_BUILD=true yarn run build

      - name: Save cache - dist folder
        if: steps.dist-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./crates/web-client/dist
          key: ${{ steps.dist-cache.outputs.cache-key }}

      - name: Upload artifacts for matrix jobs
        uses: actions/upload-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Verifies the canonical (full-optimization) release build of the WASM
  # artifact. Runs only on push to main/next so PR CI stays fast — but the
  # shipped artifact is always exercised before it can land on main.
  verify-release-build:
    name: Verify release WASM build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    env:
      # Tell sccache-action to use the GitHub Actions cache backend. The
      # action sets RUSTC_WRAPPER=sccache as a step output on success — we
      # deliberately do NOT set it at job level, so that if sccache-action
      # fails (e.g. transient GHA cache backend outage), RUSTC_WRAPPER
      # stays unset and rustc runs directly. Beats killing the whole build
      # for a cache-only optimization.
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust (needed for WASM build)
        run: |
          rustup update --no-self-update
          rustup target add wasm32-unknown-unknown
      # GitHub blocked the legacy ACTIONS_CACHE_URL endpoint that
      # mozilla-actions/sccache-action used by default. The new GHA cache
      # service requires ACTIONS_RESULTS_URL + ACTIONS_RUNTIME_TOKEN, which
      # are set in the runner's process env but NOT exported to subsequent
      # steps unless we forward them ourselves. See sccache docs:
      # https://github.com/mozilla/sccache/blob/main/docs/GHA.md
      - name: Configure sccache cache backend (v2)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        # Tolerate transient GHA cache backend failures (HTML 503 etc).
        # The probe step below validates sccache works before exposing
        # it as RUSTC_WRAPPER.
        continue-on-error: true
        id: sccache-install

      - name: Probe sccache and enable wrapper if healthy
        if: steps.sccache-install.outcome == 'success' && env.SCCACHE_PATH != ''
        shell: bash
        run: |
          # The mozilla-actions/sccache-action sets SCCACHE_PATH but does
          # NOT set RUSTC_WRAPPER. Probe by starting the sccache server,
          # which validates GHA cache backend connectivity. Only then
          # expose RUSTC_WRAPPER so cargo uses sccache as a compile cache.
          # Capture stderr so we can see WHY a probe failed.
          probe_out=$("$SCCACHE_PATH" --start-server 2>&1) && rc=0 || rc=$?
          echo "$probe_out"
          if [ $rc -eq 0 ]; then
            echo "RUSTC_WRAPPER=$SCCACHE_PATH" >> "$GITHUB_ENV"
            echo "sccache enabled as RUSTC_WRAPPER ($SCCACHE_PATH)"
          else
            echo "sccache --start-server failed (rc=$rc); running without wrapper"
          fi
      - name: Install binaryen (wasm-opt)
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen
      - name: Add Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-wasm-release
          prefix-key: ${{ env.RUST_CACHE_KEY }}
          # Save the rust-cache on push to either long-lived branch so PR
          # restores hit warm caches regardless of base. main is the default
          # branch (cache visible to all PRs via GHA fallback) and next is
          # the integration branch where most pre-release churn happens —
          # both worth caching independently so PRs against either don't
          # cold-build.
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next' }}
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: |
            crates/web-client/yarn.lock
            crates/idxdb-store/src/yarn.lock
      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh crates/web-client
      - name: Build project (full release profile)
        run: |
          cd ./crates/web-client
          yarn run build
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Moved from lint.yml so it can `needs: build-web-client-dist-folder`
  # and reuse the dist artifact (the previous job in lint.yml downloaded
  # an artifact uploaded by the now-removed wasm-bindgen-types job over
  # there).
  react-sdk-lint:
    name: React SDK lint and typecheck
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder]
    steps:
      - uses: actions/checkout@v6
      - name: Fetch web client dist
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check React SDK version sync
        run: node scripts/check-react-sdk-sync.js
      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh packages/react-sdk
      - name: Run lint
        run: make react-sdk-lint
      - name: Run typecheck
        run: cd ./packages/react-sdk && yarn typecheck

  # Reuses the WASM dist artifact from build-web-client-dist-folder. The
  # standalone wasm-bindgen-types job in lint.yml used to do a full WASM
  # rebuild here (~10 min) just to run the type-check scripts. The check
  # scripts themselves are < 30 s once the dist is downloaded.
  wasm-bindgen-types:
    name: Wasm bindgen types
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder]
    steps:
      - uses: actions/checkout@v6
      - name: Fetch web client dist
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            crates/web-client/yarn.lock
            crates/idxdb-store/src/yarn.lock
      - name: Install dependencies
        working-directory: crates/web-client
        run: yarn install --frozen-lockfile
      - name: Check bindgen type coverage
        working-directory: crates/web-client
        run: yarn check:wasm-types
      - name: Check method classification
        working-directory: crates/web-client
        run: yarn check:method-classification

  # Reuses the WASM dist artifact from build-web-client-dist-folder rather
  # than rebuilding WASM (which the standalone web-docs-check.yml previously
  # did at ~9 min cost on every PR push). The actual docs-check work is
  # < 30 s once the dist is downloaded; the slow part was the WASM rebuild.
  docs-check:
    name: Check that web client documentation is up-to-date
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder]
    steps:
      - uses: actions/checkout@v6
      - name: Check for bypass label
        if: github.event_name == 'pull_request'
        id: bypass
        uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            core.setOutput('skip', labels.includes('bypass-sdk-version-bump'));
      - name: Fetch web client dist
        if: github.event_name == 'push' || steps.bypass.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist
      - name: Setup Node.js
        if: github.event_name == 'push' || steps.bypass.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: crates/web-client/yarn.lock
      - name: Install Dependencies
        if: github.event_name == 'push' || steps.bypass.outputs.skip != 'true'
        run: ./scripts/retry-yarn-install.sh crates/web-client
      - name: Generate Documentation
        if: github.event_name == 'push' || steps.bypass.outputs.skip != 'true'
        working-directory: crates/web-client
        run: yarn typedoc
      - name: Verify Documentation is Up-to-date
        if: github.event_name == 'push' || steps.bypass.outputs.skip != 'true'
        run: git diff --exit-code docs/typedoc/web-client

  test-react-sdk:
    name: React SDK tests
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder]
    steps:
      - uses: actions/checkout@v6
      - name: Fetch web client dist
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh packages/react-sdk
      - name: Run unit tests
        run: make test-react-sdk

  test-react-sdk-integration:
    name: React SDK integration tests
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder]
    steps:
      - uses: actions/checkout@v6
      - name: Fetch web client dist
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh packages/react-sdk
      - name: Install Playwright browsers
        run: cd ./packages/react-sdk && yarn playwright install --with-deps
      - name: Run Playwright tests
        run: cd ./packages/react-sdk && yarn test:integration

  build-react-sdk:
    name: Build React SDK
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder]
    steps:
      - uses: actions/checkout@v6
      - name: Fetch web client dist
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh packages/react-sdk
      - name: Build React SDK
        run: cd ./packages/react-sdk && yarn build

  # Build test infrastructure from miden-client repo
  build-node-builder:
    name: Build node-builder
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout miden-client for test infra
        uses: actions/checkout@v6
        with:
          repository: 0xMiden/miden-client
          ref: ${{ env.MIDEN_CLIENT_REF }}
      - name: Restore node-builder binary
        id: cache-node-builder
        uses: actions/cache@v4
        with:
          path: target/release/testing-node-builder
          key: ${{ runner.os }}-node-builder-${{ env.MIDEN_CLIENT_REF }}-${{ hashFiles('Cargo.lock', 'crates/testing/node-builder/**/*') }}
      - name: Install Rust
        if: steps.cache-node-builder.outputs.cache-hit != 'true'
        run: rustup update --no-self-update
      - name: Build node-builder
        if: steps.cache-node-builder.outputs.cache-hit != 'true'
        run: cargo build --release --package node-builder --locked
      - name: Upload node-builder binary
        uses: actions/upload-artifact@v4
        with:
          name: node-builder-binary
          path: target/release/testing-node-builder

  build-remote-prover:
    name: Build remote-prover
    runs-on: ubuntu-24.04
    # Remote prover tests are slow (~14 min) and rarely affected by typical PR
    # changes. Skip on PRs unless explicitly opted in via the
    # 'run-remote-prover' label; always run on push to main/next.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-remote-prover')
    steps:
      - name: Checkout miden-client for test infra
        uses: actions/checkout@v6
        with:
          repository: 0xMiden/miden-client
          ref: ${{ env.MIDEN_CLIENT_REF }}
      - name: Restore remote-prover binary
        id: cache-remote-prover
        uses: actions/cache@v4
        with:
          path: target/release/testing-remote-prover
          key: ${{ runner.os }}-prover-${{ env.MIDEN_CLIENT_REF }}-${{ hashFiles('Cargo.lock', 'crates/testing/prover/**/*') }}
      - name: Install Rust
        if: steps.cache-remote-prover.outputs.cache-hit != 'true'
        run: rustup update --no-self-update
      - name: Build remote-prover
        if: steps.cache-remote-prover.outputs.cache-hit != 'true'
        run: cargo build --release --package testing-remote-prover --locked
      - name: Upload remote-prover binary
        uses: actions/upload-artifact@v4
        with:
          name: remote-prover-binary
          path: target/release/testing-remote-prover

  integration-tests-web-client:
    # Manually balanced shards via Playwright projects defined in
    # crates/web-client/playwright.config.ts. The previous N=7
    # alphabetical `--shard=N/M` had a 20× variance between fastest and
    # slowest shards (2 min vs 41 min); see the playwright config comment
    # for the rationale and the per-shard file lists.
    name: Integration tests (${{ matrix.project }})
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder, build-node-builder]
    strategy:
      fail-fast: false
      matrix:
        project:
          - ci-shard-1-tx-flows
          - ci-shard-2-sync-and-state
          - ci-shard-3-accounts-and-keys
          - ci-shard-4-compile-and-misc
    steps:
      - uses: actions/checkout@v6
      - name: Fetch dist folder
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: crates/web-client/yarn.lock
      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh crates/web-client
      - name: Configure setuid sandbox
        run: . ./scripts/configure-sandbox.sh
      - name: Download node-builder binary
        uses: actions/download-artifact@v4
        with:
          name: node-builder-binary
          path: ./bin
      - name: Start test node
        run: |
          chmod +x ./bin/testing-node-builder
          RUST_LOG=none ./bin/testing-node-builder &
          sleep 4
          pgrep -f testing-node-builder || (echo "Failed to start node" && exit 1)
      - name: Run web client tests
        run: |
          cd ./crates/web-client
          yarn run test:ci -- --project=${{ matrix.project }}
      - name: Stop test node
        if: always()
        run: pkill -f testing-node-builder || true

  integration-tests-remote-prover-web-client:
    name: Integration tests for remote prover
    runs-on: ubuntu-24.04
    needs: [build-web-client-dist-folder, build-node-builder, build-remote-prover]
    # Same opt-in rule as build-remote-prover. The job needs the prover binary,
    # so it can only run when build-remote-prover ran too.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-remote-prover')
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: crates/web-client/yarn.lock
      - name: Install dependencies
        run: ./scripts/retry-yarn-install.sh crates/web-client

      - name: Fetch dist folder
        uses: actions/download-artifact@v4
        with:
          name: web-client-artifacts
          path: ./crates/web-client/dist

      - name: Configure setuid sandbox
        run: . ./scripts/configure-sandbox.sh
      - name: Download node-builder binary
        uses: actions/download-artifact@v4
        with:
          name: node-builder-binary
          path: ./bin
      - name: Download remote-prover binary
        uses: actions/download-artifact@v4
        with:
          name: remote-prover-binary
          path: ./bin
      - name: Start test node
        run: |
          chmod +x ./bin/testing-node-builder
          RUST_LOG=none ./bin/testing-node-builder &
          sleep 4
          pgrep -f testing-node-builder || (echo "Failed to start node" && exit 1)
      - name: Start prover
        run: |
          chmod +x ./bin/testing-remote-prover
          RUST_LOG=none ./bin/testing-remote-prover &
          sleep 4
          pgrep -f testing-remote-prover || (echo "Failed to start prover" && exit 1)
      - name: Run remote prover tests
        run: |
          cd ./crates/web-client
          yarn run test:ci:remote_prover
      - name: Stop test node
        if: always()
        run: pkill -f testing-node-builder || true
      - name: Stop miden-prover
        if: always()
        run: pkill -f testing-remote-prover || true
