name: Lint
permissions:
  contents: read
on:
  push:
    branches: [main, next]
  pull_request:

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  typos:
    name: Spellcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: typos@1.42.0
      - run: make typos-check

  toml:
    name: Toml formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli@0.10.0
      - run: make toml-check

  eslint:
    name: Typescript eslint checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - run: make rust-client-ts-lint

  knip:
    name: Knip (unused code/deps)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Knip
        run: pnpm run check:knip

  clippy-wasm:
    name: Clippy WASM
    runs-on: ubuntu-24.04
    env:
      # See test.yml's build-web-client-dist-folder for rationale.
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust with nightly clippy
        run: |
          rustup update --no-self-update nightly
          rustup target add --toolchain nightly wasm32-unknown-unknown
          rustup +nightly component add clippy
      # `make clippy-wasm` depends on `rust-client-ts-build` which calls
      # `pnpm --filter web_store run build`. Need pnpm + populated install.
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      # See test.yml for rationale (GHA cache v1 -> v2 endpoint).
      - name: Configure sccache cache backend (v2)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
        id: sccache-install

      - name: Probe sccache and enable wrapper if healthy
        if: steps.sccache-install.outcome == 'success' && env.SCCACHE_PATH != ''
        shell: bash
        run: |
          probe_out=$("$SCCACHE_PATH" --start-server 2>&1) && rc=0 || rc=$?
          echo "$probe_out"
          if [ $rc -eq 0 ]; then
            echo "RUSTC_WRAPPER=$SCCACHE_PATH" >> "$GITHUB_ENV"
            echo "sccache enabled as RUSTC_WRAPPER ($SCCACHE_PATH)"
          else
            echo "sccache --start-server failed (rc=$rc); running without wrapper"
          fi
      - name: make - clippy-wasm
        run: make clippy-wasm
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust with rustfmt
        run: |
          rustup update --no-self-update nightly
          rustup +nightly component add rustfmt
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - name: Install prettier
        run: pnpm install --no-frozen-lockfile
      - name: make - format-check
        run: make format-check

