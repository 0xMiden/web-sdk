# Lefthook config â€” local dev hygiene hooks.
# Docs: https://lefthook.dev/configuration/
#
# Install: `pnpm install` triggers `prepare` â†’ `lefthook install`.
# Manual:  `npx lefthook install`

pre-commit:
  parallel: true
  commands:
    lint-staged:
      run: npx lint-staged
      stage_fixed: true
    typecheck-staged:
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit --skipLibCheck {staged_files}

